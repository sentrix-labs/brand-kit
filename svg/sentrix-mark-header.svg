<?xml version="1.0" encoding="UTF-8"?>
<!--
  Sentrix Chain — header variant of the diamond mark.

  Differs from sentrix-mark-tight.svg / sentrix-logo-full.svg by stripping
  the decorative outer circle ("ring") and the four cardinal pearl dots.
  At navbar sizes (24-36px), the pearl dots scale to ~1-2px and the ring
  competes with adjacent wordmark for visual weight; both vanish, leaving
  a "polos" (bare) diamond. The header variant keeps just the dual-diamond
  silhouette — outer outline + inner filled — which preserves brand
  recognition at every render size and pairs cleanly with a sans-serif
  wordmark in horizontal nav layouts.

  Use for: navbar logos, footer logos, browser tab favicons (raster
  pre-rendered).

  Do NOT use for: hero/ceremonial moments — those want the full ring +
  pearl dots composition. See brand-kit/USAGE.md.

  Stroke proportionally widened (6% of viewBox) so the outer outline
  reads cleanly down to 24px display.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" shape-rendering="geometricPrecision">
  <polygon points="50,5 95,50 50,95 5,50" fill="none" stroke="#8A5A11" stroke-width="6" stroke-linejoin="miter" stroke-miterlimit="10"/>
  <polygon points="50,31 69,50 50,69 31,50" fill="#8A5A11"/>
</svg>
