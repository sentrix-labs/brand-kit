<?xml version="1.0" encoding="UTF-8"?>
<!--
  Sentrix Chain — header mark. Diamond + 4 pearl dots, no ring, no disc.

  This is THE canonical mark for nav chrome. Composition matches the brand
  signature (outer diamond outline + filled inner diamond + 4 cardinal
  pearl dots) but with proportions retuned so the dots survive at navbar
  display sizes:

    - Original sentrix-mark-tight.svg: dots r=11 on 1024 viewBox
      (1.07% of size). At 40px display, dots = 0.4px → invisible.
    - This variant: dots r=13 on 200 viewBox (6.5%). At 40px display,
      dots = 2.6px; at 32px = 2.1px; at 56px = 3.6px → visible across
      every reasonable header size without dominating the diamond.

  Outer diamond / inner diamond ratio (~44%) matches the original brand
  mark for visual identity continuity — only the decorative dot scale is
  retuned for legibility.

  Use everywhere the mark appears next to a wordmark, including nav,
  footer, breadcrumb chrome. For ceremonial hero use, scale the same
  asset to 96px+ — the proportions still read.

  See USAGE.md for sizing, alignment, and pairing rules.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" shape-rendering="geometricPrecision">
  <polygon points="100,10 190,100 100,190 10,100" fill="none" stroke="#8A5A11" stroke-width="7" stroke-linejoin="miter" stroke-miterlimit="10"/>
  <polygon points="100,60 140,100 100,140 60,100" fill="#8A5A11"/>
  <circle cx="100" cy="10" r="13" fill="#DBC17F"/>
  <circle cx="190" cy="100" r="13" fill="#DBC17F"/>
  <circle cx="100" cy="190" r="13" fill="#DBC17F"/>
  <circle cx="10" cy="100" r="13" fill="#DBC17F"/>
</svg>
