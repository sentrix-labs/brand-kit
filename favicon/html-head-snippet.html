<!--
  Sentrix Chain — Web <head> tags
  Copy-paste into your <head> section.
  Replace "https://sentrixchain.com" with your deployment domain if different.
-->

<!-- Primary favicon -->
<link rel="icon" type="image/x-icon" href="/favicon/favicon.ico">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">

<!-- Apple iOS -->
<link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">

<!-- Android / PWA -->
<link rel="manifest" href="/favicon/site.webmanifest">

<!-- Safari pinned tab -->
<link rel="mask-icon" href="/favicon/safari-pinned-tab.svg" color="#8A5A11">

<!-- Windows tile -->
<meta name="msapplication-TileColor" content="#000000">
<meta name="msapplication-TileImage" content="/favicon/mstile-150x150.png">
<meta name="theme-color" content="#000000">

<!-- SEO basics -->
<title>Sentrix Chain — Indonesian L1 Blockchain</title>
<meta name="description" content="Sentrix Chain is a high-performance Layer 1 blockchain built in Rust. Native + EVM dual-layer execution. Chain ID 7119.">
<link rel="canonical" href="https://sentrixchain.com">
